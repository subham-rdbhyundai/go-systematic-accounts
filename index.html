<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Go Systematic — Accounts Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #1A2B5F;
    --navy-dark: #0D1A3A;
    --blue: #2C76C0;
    --blue-light: #4A9FE8;
    --amber: #BC711F;
    --amber-light: #D4891F;
    --brown: #79340A;
    --white: #FFFFFF;
    --off-white: #F5F7FA;
    --surface: #FFFFFF;
    --surface-alt: #EEF2F8;
    --border: #D0DCF0;
    --text-primary: #1A2B5F;
    --text-secondary: #4A5A7A;
    --text-muted: #7A8AAA;
    --success: #1A7A4A;
    --success-bg: #E6F4EE;
    --warning: #B85C00;
    --warning-bg: #FEF3E6;
    --danger: #B02020;
    --danger-bg: #FDEAEA;
    --shadow-sm: 0 1px 4px rgba(26,43,95,0.08);
    --shadow-md: 0 4px 16px rgba(26,43,95,0.12);
    --shadow-lg: 0 8px 32px rgba(26,43,95,0.16);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: var(--off-white);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed; top:0; left:0; bottom:0;
    width: 240px;
    background: var(--navy-dark);
    display: flex; flex-direction: column;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }
  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-logo img { height: 36px; }
  .sidebar-logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px; font-weight: 700;
    color: var(--white); line-height: 1.1;
  }
  .sidebar-logo-sub {
    font-size: 9px; letter-spacing: 1.5px;
    color: var(--amber); font-weight: 500;
    text-transform: uppercase;
  }
  .sidebar-section-label {
    font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; color: rgba(255,255,255,0.35);
    padding: 18px 18px 6px;
  }
  .sidebar-nav { flex: 1; overflow-y: auto; padding-bottom: 16px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px; cursor: pointer;
    color: rgba(255,255,255,0.65);
    font-size: 13.5px; font-weight: 500;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    text-decoration: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--white); }
  .nav-item.active {
    background: rgba(44,118,192,0.18);
    color: var(--white);
    border-left-color: var(--amber);
  }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer {
    padding: 14px 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; color: rgba(255,255,255,0.3);
    text-align: center;
  }
  .sidebar-footer strong { color: rgba(255,255,255,0.5); }

  /* MAIN */
  .main { margin-left: 240px; min-height: 100vh; }
  .topbar {
    background: var(--white);
    padding: 0 28px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    box-shadow: var(--shadow-sm);
  }
  .topbar-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--navy);
  }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }
  .content { padding: 28px; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.15s; font-family: 'Inter', sans-serif;
  }
  .btn-primary { background: var(--navy); color: var(--white); }
  .btn-primary:hover { background: var(--blue); }
  .btn-amber { background: var(--amber); color: var(--white); }
  .btn-amber:hover { background: var(--amber-light); }
  .btn-outline {
    background: transparent; color: var(--navy);
    border: 1.5px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
  .btn-danger { background: var(--danger); color: var(--white); }
  .btn-danger:hover { background: #900; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: none; padding: 6px 10px; }
  .btn-ghost:hover { color: var(--navy); background: var(--surface-alt); }

  /* CARDS */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .card-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 700; color: var(--navy);
  }
  .card-body { padding: 20px; }

  /* STATS */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
  }
  .stat-card.navy::before { background: var(--navy); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.amber::before { background: var(--amber); }
  .stat-card.brown::before { background: var(--brown); }
  .stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .stat-value { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; color: var(--navy); line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stat-icon { position: absolute; top: 18px; right: 18px; font-size: 28px; opacity: 0.1; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 14px;
    background: var(--surface-alt);
    font-size: 11px; font-weight: 600; letter-spacing: 0.6px;
    text-transform: uppercase; color: var(--text-secondary);
    border-bottom: 1.5px solid var(--border);
  }
  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    vertical-align: middle;
  }
  tr:hover td { background: var(--surface-alt); }
  tr:last-child td { border-bottom: none; }

  /* BADGES */
  .badge {
    display: inline-block;
    padding: 3px 9px; border-radius: 50px;
    font-size: 11px; font-weight: 600;
  }
  .badge-success { background: var(--success-bg); color: var(--success); }
  .badge-warning { background: var(--warning-bg); color: var(--warning); }
  .badge-danger { background: var(--danger-bg); color: var(--danger); }
  .badge-blue { background: #E6F0FB; color: var(--blue); }
  .badge-navy { background: #E8ECF5; color: var(--navy); }
  .badge-amber { background: #FEF3E6; color: var(--amber); }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-secondary); margin-bottom: 5px; letter-spacing: 0.3px;
  }
  .form-control {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px; font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    background: var(--white);
    transition: border-color 0.15s;
    outline: none;
  }
  .form-control:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(44,118,192,0.1); }
  select.form-control { cursor: pointer; }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(13,26,58,0.6);
    z-index: 200;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 20px; overflow-y: auto;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--white);
    border-radius: var(--radius);
    width: 100%; max-width: 780px;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s ease;
  }
  .modal-xl { max-width: 960px; }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--navy-dark); border-radius: var(--radius) var(--radius) 0 0;
  }
  .modal-header h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px; font-weight: 700; color: var(--white);
  }
  .modal-close {
    background: rgba(255,255,255,0.1); border: none;
    color: var(--white); width: 30px; height: 30px;
    border-radius: 50%; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: rgba(255,255,255,0.2); }
  .modal-body { padding: 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: flex-end; gap: 10px;
    background: var(--off-white); border-radius: 0 0 var(--radius) var(--radius);
  }

  /* INVOICE LINE ITEMS */
  .line-items-table { width: 100%; border-collapse: collapse; }
  .line-items-table th {
    background: var(--navy-dark); color: var(--white);
    font-size: 11px; letter-spacing: 0.5px;
  }
  .line-items-table input { border: none; background: transparent; width: 100%; outline: none; font-size: 13px; padding: 2px 4px; font-family: 'Inter', sans-serif; }
  .line-items-table td { border-bottom: 1px solid var(--border); padding: 8px 10px; }
  .li-desc { min-width: 200px; }
  .li-num { min-width: 80px; }

  /* GITHUB CONFIG */
  .config-banner {
    background: linear-gradient(135deg, var(--navy-dark), var(--navy));
    border-radius: var(--radius);
    padding: 28px 32px;
    color: var(--white);
    margin-bottom: 24px;
    border: 1px solid rgba(44,118,192,0.3);
  }
  .config-banner h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px; font-weight: 700; margin-bottom: 6px;
  }
  .config-banner p { font-size: 13.5px; color: rgba(255,255,255,0.7); margin-bottom: 20px; line-height: 1.6; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 40px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; margin-bottom: 20px; }

  /* INVOICE PREVIEW */
  .invoice-preview {
    font-size: 13px;
    font-family: 'Inter', sans-serif;
  }
  .inv-header-bar {
    background: var(--navy-dark);
    color: var(--white);
    padding: 24px 28px;
    display: flex; justify-content: space-between; align-items: flex-start;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .inv-company-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px; font-weight: 700;
  }
  .inv-tagline { font-size: 10px; letter-spacing: 2px; color: var(--amber); text-transform: uppercase; }
  .inv-title { font-size: 30px; font-weight: 800; text-align: right; color: var(--amber); font-family: 'Rajdhani', sans-serif; }
  .inv-number { font-size: 13px; color: rgba(255,255,255,0.6); text-align: right; }
  .inv-body { padding: 24px 28px; }
  .inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 20px; }
  .inv-party-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--amber); margin-bottom: 6px; }
  .inv-party-name { font-weight: 700; font-size: 15px; color: var(--navy); margin-bottom: 3px; }
  .inv-party-detail { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
  .inv-meta { display: flex; gap: 28px; padding: 12px 16px; background: var(--off-white); border-radius: var(--radius-sm); margin-bottom: 20px; border: 1px solid var(--border); }
  .inv-meta-item { }
  .inv-meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); font-weight: 600; }
  .inv-meta-val { font-size: 13px; font-weight: 600; color: var(--navy); }
  .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .inv-table th { background: var(--navy); color: white; padding: 9px 12px; text-align: left; font-size: 11px; letter-spacing: 0.5px; }
  .inv-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 12.5px; }
  .inv-table tr:last-child td { border-bottom: none; }
  .inv-totals { display: flex; justify-content: flex-end; }
  .inv-totals-box { min-width: 280px; }
  .inv-total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
  .inv-total-row.grand { font-size: 16px; font-weight: 700; color: var(--navy); border-top: 2px solid var(--navy); padding-top: 10px; margin-top: 6px; font-family: 'Rajdhani', sans-serif; }
  .inv-footer { background: var(--navy-dark); color: rgba(255,255,255,0.5); padding: 14px 28px; font-size: 11px; display: flex; justify-content: space-between; border-radius: 0 0 var(--radius) var(--radius); }

  /* TAGS */  
  .tabs { display: flex; gap: 4px; padding: 4px; background: var(--surface-alt); border-radius: var(--radius-sm); width: fit-content; margin-bottom: 20px; }
  .tab-btn { padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif; color: var(--text-secondary); background: transparent; transition: all 0.15s; }
  .tab-btn.active { background: var(--white); color: var(--navy); font-weight: 600; box-shadow: var(--shadow-sm); }

  /* ALERT */
  .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; }
  .alert-info { background: #E6F0FB; color: var(--blue); border: 1px solid #B0CFF5; }
  .alert-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid #F5CC99; }
  .alert-success { background: var(--success-bg); color: var(--success); border: 1px solid #99D4BB; }

  /* SEARCH BAR */
  .search-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .search-input-wrap { position: relative; flex: 1; max-width: 320px; }
  .search-input-wrap .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
  .search-input { padding: 8px 12px 8px 32px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; width: 100%; color: var(--text-primary); background: var(--white); }
  .search-input:focus { border-color: var(--blue); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .section-title { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .section-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .flex-gap { display: flex; align-items: center; gap: 10px; }
  .text-right { text-align: right; }
  .text-muted { color: var(--text-muted); }
  .font-mono { font-family: 'Rajdhani', sans-serif; font-weight: 700; }
  .amount { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  @media (max-width: 900px) {
    .sidebar { width: 200px; }
    .main { margin-left: 200px; }
    .stats-grid { grid-template-columns: repeat(2,1fr); }
  }
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .stats-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

// ─── GITHUB STORAGE ───
function useGitHubStorage() {
  const [config, setConfig] = useState(() => {
    const s = localStorage.getItem('gs_github_config');
    return s ? JSON.parse(s) : { token: '', repo: '', owner: '', branch: 'main', configured: false };
  });
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);

  const saveConfig = (cfg) => {
    localStorage.setItem('gs_github_config', JSON.stringify({ ...cfg, configured: true }));
    setConfig({ ...cfg, configured: true });
  };

  const apiUrl = (path) => `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}`;

  const readFile = async (path) => {
    try {
      const r = await fetch(apiUrl(path), { headers: { Authorization: `token ${config.token}`, Accept: 'application/vnd.github.v3+json' } });
      if (!r.ok) return null;
      const d = await r.json();
      return { content: JSON.parse(atob(d.content.replace(/\n/g,''))), sha: d.sha };
    } catch { return null; }
  };

  const writeFile = async (path, data, sha) => {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const body = { message: `Update ${path} — Go Systematic Accounts`, content, branch: config.branch };
    if (sha) body.sha = sha;
    const r = await fetch(apiUrl(path), {
      method: 'PUT', headers: { Authorization: `token ${config.token}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });
    return r.ok;
  };

  const loadData = async () => {
    if (!config.configured) return null;
    setSyncing(true);
    const result = await readFile('accounts-data.json');
    setSyncing(false);
    if (result) { setLastSync(new Date()); return result; }
    return null;
  };

  const saveData = async (data, sha) => {
    if (!config.configured) return false;
    setSyncing(true);
    const ok = await writeFile('accounts-data.json', data, sha);
    setSyncing(false);
    if (ok) setLastSync(new Date());
    return ok;
  };

  return { config, saveConfig, loadData, saveData, syncing, lastSync };
}

const fmt = (n) => '₹' + Number(n||0).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
const genId = (prefix) => `${prefix}-${Date.now().toString(36).toUpperCase()}`;
const today = () => new Date().toISOString().split('T')[0];

const calcLineItem = (item) => {
  const subtotal = (parseFloat(item.qty)||0) * (parseFloat(item.rate)||0);
  const gstAmt = subtotal * ((parseFloat(item.gst)||0)/100);
  return { ...item, subtotal, gstAmt, total: subtotal + gstAmt };
};

const calcDoc = (items, discount=0) => {
  const lines = items.map(calcLineItem);
  const subtotal = lines.reduce((a,b) => a + b.subtotal, 0);
  const gstTotal = lines.reduce((a,b) => a + b.gstAmt, 0);
  const discAmt = subtotal * ((parseFloat(discount)||0)/100);
  const grand = subtotal + gstTotal - discAmt;
  return { lines, subtotal, gstTotal, discAmt, grand };
};

          {page==='receipts' && <Receipts data={data} persist={persist} />}
          {page==='expenses' && <Expenses data={data} persist={persist} />}
          {page==='clients' && <Clients data={data} persist={persist} />}
          {page==='reports' && <Reports data={data} />}
          {page==='settings' && <Settings github={github} onConfigSave={()=>setShowConfigModal(false)} />}
        </div>
      </div>

      {showConfigModal && <GitHubConfigModal github={github} onClose={()=>setShowConfigModal(false)} onSave={()=>{setShowConfigModal(false); loadFromGitHub();}} />}
    </div>
  );
}

// ─── DASHBOARD ───
function Dashboard({ data, setPage }) {
  const invoices = data.invoices || [];
  const expenses = data.expenses || [];
  const receipts = data.receipts || [];

  const totalBilled = invoices.filter(i=>['Tax Invoice','Proforma Invoice','Quotation'].includes(i.type)).reduce((a,b)=>a+(b.grand||0),0);
  const totalReceived = receipts.reduce((a,b)=>a+(b.amount||0),0);
  const totalExpenses = expenses.reduce((a,b)=>a+(b.amount||0),0);
  const outstanding = totalBilled - totalReceived;

  const recent = [...invoices].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  const paid = invoices.filter(i=>i.status==='Paid').length;
  const pending = invoices.filter(i=>i.status==='Pending').length;
  const overdue = invoices.filter(i=>i.status==='Overdue').length;

  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card navy">
          <div className="stat-icon">🧾</div>
          <div className="stat-label">Total Billed</div>
          <div className="stat-value">{fmt(totalBilled)}</div>
          <div className="stat-sub">{invoices.length} documents</div>
        </div>
        <div className="stat-card blue">
          <div className="stat-icon">💳</div>
          <div className="stat-label">Amount Received</div>
          <div className="stat-value">{fmt(totalReceived)}</div>
          <div className="stat-sub">{receipts.length} receipts</div>
        </div>
        <div className="stat-card amber">
          <div className="stat-icon">⏳</div>
          <div className="stat-label">Outstanding</div>
          <div className="stat-value">{fmt(outstanding)}</div>
          <div className="stat-sub">{pending} pending · {overdue} overdue</div>
        </div>
        <div className="stat-card brown">
          <div className="stat-icon">💸</div>
          <div className="stat-label">Total Expenses</div>
          <div className="stat-value">{fmt(totalExpenses)}</div>
          <div className="stat-sub">{expenses.length} entries</div>
        </div>
      </div>

      <div className="grid-2" style={{marginBottom:24}}>
        <div className="card">
          <div className="card-header">
            <span className="card-title">Recent Documents</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>setPage('invoices')}>View all →</button>
          </div>
          <div className="table-wrap">
            {recent.length === 0
              ? <div className="empty-state"><div className="icon">📄</div><p>No documents yet</p></div>
              : <table>
                  <thead><tr><th>No.</th><th>Client</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead>
                  <tbody>
                    {recent.map(inv => (
                      <tr key={inv.id}>
                        <td className="font-mono" style={{fontSize:12}}>{inv.number}</td>
                        <td>{inv.clientName||'—'}</td>
                        <td><span className="badge badge-navy" style={{fontSize:10}}>{inv.type}</span></td>
                        <td className="amount">{fmt(inv.grand)}</td>
                        <td><StatusBadge s={inv.status}/></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
            }
          </div>
        </div>

        <div className="card">
          <div className="card-header">
            <span className="card-title">Invoice Status</span>
          </div>
          <div className="card-body">
            <StatusBar label="Paid" count={paid} total={invoices.length} color="var(--success)" />
            <StatusBar label="Pending" count={pending} total={invoices.length} color="var(--amber)" />
            <StatusBar label="Overdue" count={overdue} total={invoices.length} color="var(--danger)" />
            <StatusBar label="Draft" count={invoices.filter(i=>i.status==='Draft').length} total={invoices.length} color="var(--text-muted)" />
            <div className="divider"/>
            <div style={{fontSize:13,color:'var(--text-secondary)'}}>
              <strong>FY Summary</strong>
              <div style={{marginTop:10,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <SummaryItem label="Net Revenue" val={fmt(totalReceived)}/>
                <SummaryItem label="Total GST" val={fmt(invoices.reduce((a,b)=>a+(b.gstTotal||0),0))}/>
                <SummaryItem label="Expenses" val={fmt(totalExpenses)}/>
                <SummaryItem label="Net P&L" val={fmt(totalReceived-totalExpenses)}/>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function StatusBar({ label, count, total, color }) {
  const pct = total>0 ? (count/total*100) : 0;
  return (
    <div style={{marginBottom:14}}>
      <div className="flex-between" style={{marginBottom:4}}>
        <span style={{fontSize:13}}>{label}</span>
        <span style={{fontSize:13,fontWeight:600}}>{count} / {total}</span>
      </div>
      <div style={{height:6,background:'var(--border)',borderRadius:3}}>
        <div style={{height:6,width:`${pct}%`,background:color,borderRadius:3,transition:'width 0.4s'}}/>
      </div>
    </div>
  );
}
function SummaryItem({label,val}) {
  return <div style={{background:'var(--off-white)',padding:'8px 10px',borderRadius:6}}>
    <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.5px'}}>{label}</div>
    <div style={{fontSize:14,fontWeight:700,color:'var(--navy)',fontFamily:'Rajdhani, sans-serif'}}>{val}</div>
  </div>;
}
function StatusBadge({s}) {
  const map = { Paid:'badge-success', Pending:'badge-warning', Overdue:'badge-danger', Draft:'badge-navy', Sent:'badge-blue', Cancelled:'badge-amber' };
  return <span className={`badge ${map[s]||'badge-navy'}`}>{s||'Draft'}</span>;
}

// ─── INVOICES ───
function Invoices({ data, persist }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [preview, setPreview] = useState(null);
  const [filter, setFilter] = useState('All');
  const [search, setSearch] = useState('');
  const invoices = data.invoices || [];

  const filtered = invoices.filter(inv => {
    const matchFilter = filter==='All' || inv.type===filter || inv.status===filter;
    const matchSearch = !search || (inv.number||'').toLowerCase().includes(search.toLowerCase()) || (inv.clientName||'').toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const save = (doc) => {
    const inv = { ...doc, id: doc.id||genId('INV'), date: doc.date||today() };
    const updated = doc.id ? invoices.map(i=>i.id===doc.id?inv:i) : [inv, ...invoices];
    persist({ ...data, invoices: updated });
    setShowForm(false); setEditing(null);
  };
  const del = (id) => { if(confirm('Delete this document?')) persist({ ...data, invoices: invoices.filter(i=>i.id!==id) }); };
  const setStatus = (id, status) => persist({ ...data, invoices: invoices.map(i=>i.id===id?{...i,status}:i) });

  return (
    <div>
      <div className="flex-between" style={{marginBottom:20}}>
        <div>
          <div className="section-title">Invoices & Documents</div>
          <div className="section-sub">Manage all your financial documents</div>
        </div>
        <button className="btn btn-primary" onClick={()=>{setEditing(null);setShowForm(true);}}>+ New Document</button>
      </div>

      <div className="search-bar">
        <div className="search-input-wrap">
          <span className="icon">🔍</span>
          <input className="search-input" placeholder="Search by number or client…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div className="tabs">
          {['All','Tax Invoice','Proforma Invoice','Debit Note','Credit Note','Pending','Overdue'].map(f=>(
            <button key={f} className={`tab-btn ${filter===f?'active':''}`} onClick={()=>setFilter(f)}>{f}</button>
          ))}
        </div>
      </div>

      <div className="card">
        <div className="table-wrap">
          {filtered.length===0
            ? <div className="empty-state"><div className="icon">🧾</div><h3>No documents found</h3><p>Create your first invoice or document</p><button className="btn btn-primary" onClick={()=>setShowForm(true)}>+ New Document</button></div>
            : <table>
                <thead><tr><th>Number</th><th>Type</th><th>Date</th><th>Due Date</th><th>Client</th><th>Subtotal</th><th>GST</th><th>Grand Total</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                  {filtered.map(inv=>(
                    <tr key={inv.id}>
                      <td className="font-mono" style={{fontSize:12}}>{inv.number}</td>
                      <td><span className="badge badge-navy" style={{fontSize:10}}>{inv.type}</span></td>
                      <td>{fmtDate(inv.date)}</td>
                      <td>{fmtDate(inv.dueDate)}</td>
                      <td>{inv.clientName||'—'}</td>
                      <td className="amount">{fmt(inv.subtotal)}</td>
                      <td className="amount" style={{color:'var(--amber)'}}>{fmt(inv.gstTotal)}</td>
                      <td className="amount" style={{color:'var(--navy)'}}>{fmt(inv.grand)}</td>
                      <td>
                        <select value={inv.status||'Draft'} onChange={e=>setStatus(inv.id,e.target.value)} style={{border:'none',background:'transparent',fontSize:12,cursor:'pointer',fontFamily:'Inter',fontWeight:600}}>
                          {['Draft','Sent','Pending','Paid','Overdue','Cancelled'].map(s=><option key={s}>{s}</option>)}
                        </select>
                      </td>
                      <td>
                        <div className="flex-gap">
                          <button className="btn btn-ghost btn-sm" onClick={()=>setPreview(inv)} title="Preview">👁</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>{setEditing(inv);setShowForm(true);}} title="Edit">✏️</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>exportInvoicePDF(inv)} title="PDF">📄</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>del(inv.id)} title="Delete">🗑</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
        </div>
      </div>

      <div style={{marginTop:14,display:'flex',gap:10}}>
        <button className="btn btn-outline btn-sm" onClick={()=>exportToExcel(invoices,'Invoices')}>⬇ Export Excel</button>
        <button className="btn btn-outline btn-sm" onClick={()=>exportAllPDF(invoices)}>⬇ Export PDF Summary</button>
      </div>

      {showForm && <InvoiceForm initial={editing} clients={data.clients||[]} onSave={save} onClose={()=>{setShowForm(false);setEditing(null);}} />}
      {preview && <InvoicePreviewModal inv={preview} onClose={()=>setPreview(null)} />}
    </div>
  );
}

// ─── INVOICE FORM ───
function InvoiceForm({ initial, clients, onSave, onClose }) {
  const [doc, setDoc] = useState(initial || {
    type: 'Tax Invoice', number: '', date: today(), dueDate: '', status: 'Draft',
    clientName: '', clientAddress: '', clientGST: '', clientEmail: '',
    items: [{ desc: '', hsn: '', qty: 1, unit: 'Nos', rate: 0, gst: 18 }],
    discount: 0, notes: '', terms: 'Payment due within 30 days.\nPlease include invoice number in payment reference.',
    placeOfSupply: '', reverseCharge: false,
  });

  const { lines, subtotal, gstTotal, discAmt, grand } = calcDoc(doc.items||[], doc.discount);

  const setField = (k,v) => setDoc(d=>({...d,[k]:v}));
  const setItem = (i,k,v) => setDoc(d=>({ ...d, items: d.items.map((it,idx)=>idx===i?{...it,[k]:v}:it) }));
  const addItem = () => setDoc(d=>({...d,items:[...d.items,{desc:'',hsn:'',qty:1,unit:'Nos',rate:0,gst:18}]}));
  const delItem = (i) => setDoc(d=>({...d,items:d.items.filter((_,idx)=>idx!==i)}));

  const fillClient = (name) => {
    const c = clients.find(c=>c.name===name);
    if(c) setDoc(d=>({...d,clientName:c.name,clientAddress:c.address||'',clientGST:c.gst||'',clientEmail:c.email||''}));
    else setField('clientName',name);
  };

  const handleSave = () => {
    if (!doc.number) { alert('Please enter a document number'); return; }
    onSave({ ...doc, subtotal, gstTotal, discAmt, grand, lines });
  };

  return (
    <div className="modal-backdrop">
      <div className="modal modal-xl">
        <div className="modal-header">
          <h2>{initial ? 'Edit' : 'New'} {doc.type}</h2>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body" style={{maxHeight:'75vh',overflowY:'auto'}}>
          {/* Doc type & number */}
          <div className="form-grid-3" style={{marginBottom:16}}>
            <div className="form-group">
              <label className="form-label">Document Type</label>
              <select className="form-control" value={doc.type} onChange={e=>setField('type',e.target.value)}>
                {DOC_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Document Number *</label>
              <input className="form-control" value={doc.number} onChange={e=>setField('number',e.target.value)} placeholder="GS-2024-001"/>
            </div>
            <div className="form-group">
              <label className="form-label">Status</label>
              <select className="form-control" value={doc.status} onChange={e=>setField('status',e.target.value)}>
                {['Draft','Sent','Pending','Paid','Overdue','Cancelled'].map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <div className="form-grid-3" style={{marginBottom:16}}>
            <div className="form-group">
              <label className="form-label">Issue Date</label>
              <input type="date" className="form-control" value={doc.date} onChange={e=>setField('date',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Due Date</label>
              <input type="date" className="form-control" value={doc.dueDate} onChange={e=>setField('dueDate',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Place of Supply</label>
              <input className="form-control" value={doc.placeOfSupply} onChange={e=>setField('placeOfSupply',e.target.value)} placeholder="State"/>
            </div>
          </div>

          <div className="divider"/>
          <div style={{marginBottom:12,fontWeight:600,fontSize:13,color:'var(--navy)'}}>🏢 Client / Bill To</div>
          <div className="form-grid-2" style={{marginBottom:8}}>
            <div className="form-group">
              <label className="form-label">Client Name *</label>
              <input className="form-control" value={doc.clientName} list="client-list" onChange={e=>fillClient(e.target.value)} placeholder="Search or type client name"/>
              <datalist id="client-list">{clients.map(c=><option key={c.id} value={c.name}/>)}</datalist>
            </div>
            <div className="form-group">
              <label className="form-label">Client Email</label>
              <input className="form-control" value={doc.clientEmail} onChange={e=>setField('clientEmail',e.target.value)} placeholder="client@email.com"/>
            </div>
          </div>
          <div className="form-grid-2">
            <div className="form-group">
              <label className="form-label">Client Address</label>
              <textarea className="form-control" rows={2} value={doc.clientAddress} onChange={e=>setField('clientAddress',e.target.value)} placeholder="Full address"/>
            </div>
            <div className="form-group">
              <label className="form-label">Client GST Number</label>
              <input className="form-control" value={doc.clientGST} onChange={e=>setField('clientGST',e.target.value)} placeholder="GSTIN (if applicable)"/>
            </div>
          </div>

          <div className="divider"/>
          <div className="flex-between" style={{marginBottom:12}}>
            <span style={{fontWeight:600,fontSize:13,color:'var(--navy)'}}>📦 Line Items</span>
            <button className="btn btn-outline btn-sm" onClick={addItem}>+ Add Item</button>
          </div>
          <div className="table-wrap">
            <table className="line-items-table">
              <thead>
                <tr>
                  <th style={{width:'28%',padding:'9px 10px'}}>Description</th>
                  <th style={{width:'9%',padding:'9px 10px'}}>HSN/SAC</th>
                  <th style={{width:'7%',padding:'9px 10px'}}>Qty</th>
                  <th style={{width:'7%',padding:'9px 10px'}}>Unit</th>
                  <th style={{width:'11%',padding:'9px 10px'}}>Rate (₹)</th>
                  <th style={{width:'8%',padding:'9px 10px'}}>GST %</th>
                  <th style={{width:'10%',padding:'9px 10px'}}>Subtotal</th>
                  <th style={{width:'10%',padding:'9px 10px'}}>GST</th>
                  <th style={{width:'10%',padding:'9px 10px'}}>Total</th>
                  <th style={{width:'4%'}}></th>
                </tr>
              </thead>
              <tbody>
                {(doc.items||[]).map((item,i)=>{
                  const c = calcLineItem(item);
                  return (
                    <tr key={i}>
                      <td><input value={item.desc} onChange={e=>setItem(i,'desc',e.target.value)} placeholder="Item / service description"/></td>
                      <td><input value={item.hsn} onChange={e=>setItem(i,'hsn',e.target.value)} placeholder="HSN"/></td>
                      <td><input type="number" value={item.qty} onChange={e=>setItem(i,'qty',e.target.value)} min={0}/></td>
                      <td>
                        <select value={item.unit} onChange={e=>setItem(i,'unit',e.target.value)} style={{border:'none',background:'transparent',fontSize:12,width:'100%',fontFamily:'Inter'}}>
                          {['Nos','Hrs','Days','Kg','Ltr','Mtr','Pcs','Set','Job'].map(u=><option key={u}>{u}</option>)}
                        </select>
                      </td>
                      <td><input type="number" value={item.rate} onChange={e=>setItem(i,'rate',e.target.value)} min={0}/></td>
                      <td>
                        <select value={item.gst} onChange={e=>setItem(i,'gst',e.target.value)} style={{border:'none',background:'transparent',fontSize:12,fontFamily:'Inter'}}>
                          {GST_RATES.map(r=><option key={r} value={r}>{r}%</option>)}
                        </select>
                      </td>
                      <td style={{color:'var(--text-secondary)',fontSize:12}}>{fmt(c.subtotal)}</td>
                      <td style={{color:'var(--amber)',fontSize:12}}>{fmt(c.gstAmt)}</td>
                      <td style={{fontWeight:600,color:'var(--navy)',fontSize:12}}>{fmt(c.total)}</td>
                      <td><button className="btn btn-ghost btn-sm" onClick={()=>delItem(i)} style={{color:'var(--danger)',padding:'2px 6px'}}>✕</button></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div className="flex-between" style={{marginTop:16,alignItems:'flex-start'}}>
            <div style={{flex:1,maxWidth:320}}>
              <div className="form-group">
                <label className="form-label">Discount (%)</label>
                <input type="number" className="form-control" value={doc.discount} onChange={e=>setField('discount',e.target.value)} min={0} max={100} style={{maxWidth:120}}/>
              </div>
              <div className="form-group">
                <label className="form-label">Notes / Remarks</label>
                <textarea className="form-control" rows={2} value={doc.notes} onChange={e=>setField('notes',e.target.value)} placeholder="Additional notes for this document"/>
              </div>
              <div className="form-group">
                <label className="form-label">Terms & Conditions</label>
                <textarea className="form-control" rows={3} value={doc.terms} onChange={e=>setField('terms',e.target.value)}/>
              </div>
            </div>
            <div style={{minWidth:260,background:'var(--off-white)',borderRadius:8,padding:16,border:'1px solid var(--border)'}}>
              <TotalRow label="Subtotal" val={fmt(subtotal)}/>
              {discAmt>0 && <TotalRow label={`Discount (${doc.discount}%)`} val={`- ${fmt(discAmt)}`} color="var(--success)"/>}
              <TotalRow label="Total GST" val={fmt(gstTotal)} color="var(--amber)"/>
              <div style={{borderTop:'2px solid var(--navy)',paddingTop:10,marginTop:8}}>
                <TotalRow label="Grand Total" val={fmt(grand)} bold large/>
              </div>
              <div style={{marginTop:8,fontSize:11,color:'var(--text-muted)'}}>
                GST: {COMPANY.gst}
              </div>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave}>💾 Save Document</button>
        </div>
      </div>
    </div>
  );
}

function TotalRow({label,val,color,bold,large}) {
  return (
    <div className="flex-between" style={{padding:'4px 0',fontSize:large?15:13,fontWeight:bold?700:400,fontFamily:bold?'Rajdhani, sans-serif':'Inter, sans-serif',color:color||'var(--text-primary)'}}>
      <span>{label}</span><span>{val}</span>
    </div>
  );
}

// ─── REPORTS ───
function Reports({ data }) {
  const invoices = data.invoices || [];
  const expenses = data.expenses || [];
  const receipts = data.receipts || [];

  const totalBilled = invoices.reduce((a,b)=>a+(b.grand||0),0);
  const totalGSTCollected = invoices.reduce((a,b)=>a+(b.gstTotal||0),0);
  const totalReceived = receipts.reduce((a,b)=>a+(parseFloat(b.amount)||0),0);
  const totalExpenses = expenses.reduce((a,b)=>a+(parseFloat(b.amount)||0),0);
  const totalGSTInput = expenses.reduce((a,b)=>a+(parseFloat(b.gstInput)||0),0);
  const netGST = totalGSTCollected - totalGSTInput;
  const netPL = totalReceived - totalExpenses;

  const byClient = {};
  invoices.forEach(inv => {
    if (!inv.clientName) return;
    if (!byClient[inv.clientName]) byClient[inv.clientName] = 0;
    byClient[inv.clientName] += inv.grand||0;
  });
  const topClients = Object.entries(byClient).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const byCat = {};
  expenses.forEach(e => {
    const c = e.category||'Other';
    if (!byCat[c]) byCat[c] = 0;
    byCat[c] += parseFloat(e.amount)||0;
  });

  const exportFullReport = () => {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(invoices.map(i=>({...i,lines:undefined}))), 'Invoices');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(receipts), 'Receipts');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(expenses), 'Expenses');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data.clients||[]), 'Clients');
    XLSX.writeFile(wb, `GoSystematic_FullReport_${today()}.xlsx`);
  };

  return (
    <div>
      <div className="flex-between" style={{marginBottom:20}}>
        <div>
          <div className="section-title">Reports & Analytics</div>
          <div className="section-sub">Financial overview and summaries</div>
        </div>
        <button className="btn btn-amber" onClick={exportFullReport}>⬇ Export Full Report (Excel)</button>
      </div>

      <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <div className="stat-card navy"><div className="stat-label">Total Revenue</div><div className="stat-value">{fmt(totalBilled)}</div></div>
        <div className="stat-card blue"><div className="stat-label">Received</div><div className="stat-value">{fmt(totalReceived)}</div></div>
        <div className="stat-card amber"><div className="stat-label">Net GST Payable</div><div className="stat-value">{fmt(netGST)}</div><div className="stat-sub">Collected: {fmt(totalGSTCollected)} | Input: {fmt(totalGSTInput)}</div></div>
        <div className="stat-card brown"><div className="stat-label">Net P&L</div><div className="stat-value">{fmt(netPL)}</div><div className="stat-sub">Revenue - Expenses</div></div>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-header"><span className="card-title">Top Clients by Revenue</span></div>
          <div className="card-body">
            {topClients.length===0 ? <p className="text-muted" style={{fontSize:13}}>No invoice data yet.</p>
            : topClients.map(([name,amt])=>(
              <div key={name} style={{marginBottom:12}}>
                <div className="flex-between" style={{marginBottom:4}}>
                  <span style={{fontSize:13}}>{name}</span>
                  <span className="amount">{fmt(amt)}</span>
                </div>
                <div style={{height:5,background:'var(--border)',borderRadius:3}}>
                  <div style={{height:5,width:`${(amt/topClients[0][1])*100}%`,background:'var(--blue)',borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">Expenses by Category</span></div>
          <div className="card-body">
            {Object.keys(byCat).length===0 ? <p className="text-muted" style={{fontSize:13}}>No expense data yet.</p>
            : Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>(
              <div key={cat} style={{marginBottom:12}}>
                <div className="flex-between" style={{marginBottom:4}}>
                  <span style={{fontSize:13}}>{cat}</span>
                  <span className="amount" style={{color:'var(--danger)'}}>{fmt(amt)}</span>
                </div>
                <div style={{height:5,background:'var(--border)',borderRadius:3}}>
                  <div style={{height:5,width:`${(amt/Math.max(...Object.values(byCat)))*100}%`,background:'var(--amber)',borderRadius:3}}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="card" style={{marginTop:20}}>
        <div className="card-header"><span className="card-title">GST Summary (for Filing)</span></div>
        <div className="card-body">
          <div className="alert alert-warning">⚠️ GST registration pending. These figures are for internal tracking only.</div>
          <table>
            <thead><tr><th>Description</th><th>Amount</th></tr></thead>
            <tbody>
              <tr><td>Total GST Collected (Output Tax)</td><td className="amount">{fmt(totalGSTCollected)}</td></tr>
              <tr><td>Total GST on Purchases (Input Tax Credit)</td><td className="amount">{fmt(totalGSTInput)}</td></tr>
              <tr><td><strong>Net GST Payable</strong></td><td className="amount" style={{color:'var(--navy)',fontWeight:700}}>{fmt(netGST)}</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function GitHubConfigForm({ github, onSave }) {
  const [cfg, setCfg] = useState(github.config);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const set = (k,v) => setCfg(c=>({...c,[k]:v}));

  const test = async () => {
    setTesting(true); setTestResult(null);
    try {
      const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`, {
        headers: { Authorization: `token ${cfg.token}`, Accept: 'application/vnd.github.v3+json' }
      });
      setTestResult(r.ok ? 'success' : 'error');
    } catch { setTestResult('error'); }
    setTesting(false);
  };

  return (
    <div>
      <div className="alert alert-info">ℹ️ Your data will be stored as <code>accounts-data.json</code> in your GitHub repo.</div>
      <div className="form-group"><label className="form-label">GitHub Owner (username/org)</label><input className="form-control" value={cfg.owner} onChange={e=>set('owner',e.target.value)} placeholder="your-github-username"/></div>
      <div className="form-group"><label className="form-label">Repository Name</label><input className="form-control" value={cfg.repo} onChange={e=>set('repo',e.target.value)} placeholder="go-systematic-accounts"/></div>
      <div className="form-group"><label className="form-label">Branch</label><input className="form-control" value={cfg.branch} onChange={e=>set('branch',e.target.value)} placeholder="main"/></div>
      <div className="form-group"><label className="form-label">Personal Access Token</label><input type="password" className="form-control" value={cfg.token} onChange={e=>set('token',e.target.value)} placeholder="ghp_…"/><div style={{fontSize:11,color:'var(--text-muted)',marginTop:4}}>Needs repo read/write permission. Never share this token.</div></div>
      {testResult && <div className={`alert ${testResult==='success'?'alert-success':'alert-warning'}`}>{testResult==='success'?'✅ Connected successfully!':'❌ Connection failed. Check your credentials.'}</div>}
      <div className="flex-gap">
        <button className="btn btn-outline" onClick={test} disabled={testing}>{testing?'Testing…':'🔌 Test Connection'}</button>
        <button className="btn btn-primary" onClick={()=>github.saveConfig(cfg)}>💾 Save Config</button>
      </div>
    </div>
  );
}

function GitHubConfigModal({ github, onClose, onSave }) {
  return (
    <div className="modal-backdrop">
      <div className="modal" style={{maxWidth:520}}>
        <div className="modal-header"><h2>Connect GitHub Storage</h2><button className="modal-close" onClick={onClose}>✕</button></div>
        <div className="modal-body"><GitHubConfigForm github={github} onSave={onSave}/></div>
        <div className="modal-footer"><button className="btn btn-outline" onClick={onClose}>Later (use local storage)</button></div>
      </div>
    </div>
  );
}

function exportToExcel(data, sheetName) {
  const wb = XLSX.utils.book_new();
  const clean = data.map(r => { const {id,sha,lines,...rest} = r; return rest; });
  const ws = XLSX.utils.json_to_sheet(clean);
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, `GoSystematic_${sheetName}_${today()}.xlsx`);
}

function exportInvoicePDF(inv) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, m = 18;

  // Header background
  doc.setFillColor(13, 26, 58);
  doc.rect(0, 0, W, 48, 'F');

  // Company name
  doc.setTextColor(255,255,255);
  doc.setFontSize(20); doc.setFont('helvetica','bold');
  doc.text('Go Systematic', m, 18);
  doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.setTextColor(188,113,31);
  doc.text('AUTOMATE. ACCELERATE. ACHIEVE. AI', m, 24);
  doc.setTextColor(150,160,180);
  doc.setFontSize(8);
  doc.text('Automation Pursuits LLP', m, 30);
  doc.text('GST: PENDING REGISTRATION', m, 35);

  // Doc type & number
  doc.setTextColor(188,113,31);
  doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text(inv.type||'Invoice', W-m, 18, {align:'right'});
  doc.setTextColor(200,210,230);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(`#${inv.number}`, W-m, 25, {align:'right'});
  doc.text(`Date: ${fmtDate(inv.date)}`, W-m, 31, {align:'right'});
  if(inv.dueDate) doc.text(`Due: ${fmtDate(inv.dueDate)}`, W-m, 37, {align:'right'});

  let y = 56;
  // Bill To
  doc.setTextColor(188,113,31); doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.text('BILL TO', m, y);
  y += 5;
  doc.setTextColor(13,26,58); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(inv.clientName||'—', m, y); y+=5;
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(80,90,120);
  if(inv.clientAddress) { doc.text(inv.clientAddress, m, y); y+=4; }
  if(inv.clientGST) { doc.text(`GST: ${inv.clientGST}`, m, y); y+=4; }

  y += 4;
  // Table header
  doc.setFillColor(13,26,58);
  doc.rect(m, y, W-2*m, 7, 'F');
  doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','bold');
  const cols = [{t:'#',x:m+2,w:6},{t:'Description',x:m+10,w:60},{t:'HSN',x:m+72,w:15},{t:'Qty',x:m+89,w:10},{t:'Rate',x:m+101,w:20},{t:'GST%',x:m+123,w:12},{t:'Total',x:m+137,w:25}];
  cols.forEach(c=>doc.text(c.t, c.x, y+5));
  y += 9;

  // Table rows
  doc.setFont('helvetica','normal'); doc.setFontSize(8);
  (inv.lines||inv.items||[]).forEach((item,i)=>{
    const cl = calcLineItem(item);
    if(i%2===0){doc.setFillColor(245,247,250);doc.rect(m,y-4,W-2*m,7,'F');}
    doc.setTextColor(26,43,95);
    doc.text(`${i+1}`, m+2, y);
    doc.text((item.desc||'').substring(0,35), m+10, y);
    doc.text(item.hsn||'—', m+72, y);
    doc.text(`${item.qty}`, m+89, y);
    doc.text(fmt(item.rate), m+101, y);
    doc.text(`${item.gst||0}%`, m+123, y);
    doc.text(fmt(cl.total), m+137, y);
    y += 7;
  });

  y += 4;
  // Totals box
  const { subtotal, gstTotal, discAmt, grand } = calcDoc(inv.items||[], inv.discount);
  const bx = W-m-60;
  doc.setFillColor(238,242,248); doc.rect(bx, y, 60, 30, 'F');
  doc.setTextColor(80,90,120); doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.text('Subtotal:', bx+2, y+8); doc.text(fmt(subtotal), bx+58, y+8, {align:'right'});
  doc.text('Total GST:', bx+2, y+14); doc.setTextColor(188,113,31); doc.text(fmt(gstTotal), bx+58, y+14, {align:'right'});
  doc.setFillColor(13,26,58); doc.rect(bx, y+18, 60, 10, 'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('GRAND TOTAL', bx+2, y+25); doc.text(fmt(grand), bx+58, y+25, {align:'right'});

  // Notes
  if(inv.notes) {
    y += 38;
    doc.setFontSize(7); doc.setTextColor(100,110,130); doc.setFont('helvetica','normal');
    doc.text(`Notes: ${inv.notes}`, m, y);
  }

  // Footer
  doc.setFillColor(13,26,58);
  doc.rect(0,285,W,12,'F');
  doc.setTextColor(120,130,150); doc.setFontSize(7);
  doc.text('Automation Pursuits LLP — Go Systematic', m, 291);
  doc.text('Computer-generated document', W/2, 291, {align:'center'});
  doc.text(COMPANY.gst, W-m, 291, {align:'right'});

  doc.save(`${inv.number}_${inv.clientName||'invoice'}.pdf`);
}

function exportAllPDF(invoices) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W=210, m=18;
  doc.setFillColor(13,26,58); doc.rect(0,0,W,32,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('Go Systematic — Invoice Summary', m, 14);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(150,160,180);
  doc.text(`Generated: ${new Date().toLocaleString('en-IN')}`, m, 22);
  doc.text(`Total: ${invoices.length} documents`, W-m, 22, {align:'right'});
  let y=40;
  doc.setFillColor(13,26,58); doc.rect(m,y,W-2*m,6,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(7);
  ['#','Number','Type','Date','Client','Grand Total','Status'].forEach((h,i)=>{
    const xs=[m+2,m+10,m+36,m+62,m+82,m+130,m+155];
    doc.text(h,xs[i],y+4);
  });
  y+=8;
  invoices.forEach((inv,i)=>{
    if(i%2===0){doc.setFillColor(245,247,250);doc.rect(m,y-3,W-2*m,6,'F');}
    doc.setTextColor(26,43,95); doc.setFontSize(7); doc.setFont('helvetica','normal');
    const xs=[m+2,m+10,m+36,m+62,m+82,m+130,m+155];
    [i+1,inv.number,inv.type,fmtDate(inv.date),(inv.clientName||'').substring(0,18),fmt(inv.grand),inv.status||'Draft'].forEach((v,j)=>doc.text(`${v}`,xs[j],y+1));
    y+=6;
    if(y>270){doc.addPage();y=20;}
  });
  const total=invoices.reduce((a,b)=>a+(b.grand||0),0);
  y+=4;
  doc.setFillColor(238,242,248); doc.rect(m,y,W-2*m,10,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(13,26,58);
  doc.text(`Total: ${fmt(total)}`, W-m, y+7, {align:'right'});
  doc.save(`GoSystematic_InvoiceSummary_${today()}.pdf`);
}
